<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmlakHız — Gayrimenkulün Geleceği Hızında.</title>
    <meta name="description" content="EmlakHız ile hayallerinizdeki eve en hızlı ve akıllı yoldan ulaşın. Küratörlü portföy ve AI destekli değerleme ile gayrimenkul deneyimini yeniden tanımlıyoruz." />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://emlakhiz.pro/" />
    <meta property="og:title" content="EmlakHız — Gayrimenkulün Geleceği Hızında." />
    <meta property="og:description" content="AI destekli gayrimenkul yatırım protokolü. Türkiye'nin en seçkin portföyü." />
    <meta property="og:image" content="/images/logo.png" />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "EmlakHız",
        "url": "https://emlakhiz.pro/",
        "logo": "https://emlakhiz.pro/images/logo.png",
        "description": "Yapay zeka destekli lüks gayrimenkul yatırım ve değerleme platformu.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "İstanbul",
          "addressCountry": "TR"
        },
        "priceRange": "$$$$"
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Instrument+Serif:ital@0;1&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
  </head>

    <div class="noise-overlay"></div>
